---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: ai-debugging
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: ai-debugging
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE TABLE IF NOT EXISTS incident_embeddings (
        id               UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        sys_id           VARCHAR(64) UNIQUE NOT NULL,
        number           VARCHAR(32) NOT NULL,
        description      TEXT NOT NULL,
        root_cause       TEXT,
        resolution       TEXT,
        priority         VARCHAR(16),
        source           VARCHAR(16) DEFAULT 'AI',
        confidence       DOUBLE PRECISION,
        feedback_count   INTEGER DEFAULT 0,
        acceptance_count INTEGER DEFAULT 0,
        rejection_count  INTEGER DEFAULT 0,
        embedding        vector(1536),
        resolved_at      TIMESTAMPTZ,
        created_at       TIMESTAMPTZ DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS incident_embeddings_idx
        ON incident_embeddings
        USING ivfflat (embedding vector_cosine_ops)
        WITH (lists = 100);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ai-debugging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: incidents
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "incidents"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ai-debugging
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
